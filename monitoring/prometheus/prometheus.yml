global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files: []

scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Cost Service
  - job_name: "cost-service"
    static_configs:
      - targets: ["cost-service:8000"]
    metrics_path: "/metrics"

  # ML Service
  - job_name: "ml-service"
    static_configs:
      - targets: ["ml-service:8000"]
    metrics_path: "/metrics"

  # PostgreSQL (via exporter)
  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  # Redis (via exporter)
  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
