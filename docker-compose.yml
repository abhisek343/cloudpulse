services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: cloudpulse-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cloudpulse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: cloudpulse-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ Message Queue
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: cloudpulse-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 5

  # Cost Service
  cost-service:
    build:
      context: ./services/cost-service
      dockerfile: Dockerfile
    container_name: cloudpulse-cost-service
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/cloudpulse
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      ENVIRONMENT: development
      DEBUG: "true"
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./services/cost-service/app:/app/app:ro
    restart: unless-stopped

  # ML Service
  ml-service:
    build:
      context: ./services/ml-service
      dockerfile: Dockerfile
    container_name: cloudpulse-ml-service
    environment:
      COST_SERVICE_URL: http://cost-service:8000
      REDIS_URL: redis://redis:6379/1
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      ENVIRONMENT: development
    ports:
      - "8002:8000"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./services/ml-service/app:/app/app:ro
      - ml_models:/app/models
    restart: unless-stopped

  # Frontend Dashboard
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cloudpulse-frontend
    environment:
      NEXT_PUBLIC_COST_SERVICE_URL: http://localhost:8001
      NEXT_PUBLIC_ML_SERVICE_URL: http://localhost:8002
    ports:
      - "3000:3000"
    depends_on:
      - cost-service
      - ml-service
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  ml_models:
