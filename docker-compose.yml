services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: cloudpulse-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: cloudpulse-dev-password
      POSTGRES_DB: cloudpulse
    ports:
      - "55433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: cloudpulse-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ Message Queue
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: cloudpulse-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: cloudpulse
      RABBITMQ_DEFAULT_PASS: cloudpulse-dev-password
    ports:
      - "5672:5672"
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 5

  # Cost Service
  cost-service:
    build:
      context: ./services/cost-service
      dockerfile: Dockerfile
    container_name: cloudpulse-cost-service
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:cloudpulse-dev-password@db:5432/cloudpulse
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://cloudpulse:cloudpulse-dev-password@rabbitmq:5672/
      ENVIRONMENT: development
      DEBUG: "true"
      OTEL_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_INSECURE: "true"
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      otel-collector:
        condition: service_started
    volumes:
      - ./services/cost-service/app:/app/app:ro
      - ./services/cost-service/scripts:/app/scripts:ro
    restart: unless-stopped

  # Cost Worker (Background Tasks)
  cost-worker:
    build:
      context: ./services/cost-service
      dockerfile: Dockerfile
    container_name: cloudpulse-cost-worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:cloudpulse-dev-password@db:5432/cloudpulse
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://cloudpulse:cloudpulse-dev-password@rabbitmq:5672/
      ENVIRONMENT: development
      OTEL_ENABLED: "true"
      OTEL_SERVICE_NAME: cloudpulse-cost-worker
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_INSECURE: "true"
    command: python -m app.worker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      otel-collector:
        condition: service_started
    volumes:
      - ./services/cost-service/app:/app/app:ro
      - ./services/cost-service/scripts:/app/scripts:ro
    restart: unless-stopped

  # ML Service
  ml-service:
    build:
      context: ./services/ml-service
      dockerfile: Dockerfile
    container_name: cloudpulse-ml-service
    env_file:
      - .env
    environment:
      COST_SERVICE_URL: http://cost-service:8000
      REDIS_URL: redis://redis:6379/1
      RABBITMQ_URL: amqp://cloudpulse:cloudpulse-dev-password@rabbitmq:5672/
      ENVIRONMENT: development
      OTEL_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_INSECURE: "true"
    ports:
      - "8002:8000"
    depends_on:
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
    volumes:
      - ./services/ml-service/app:/app/app:ro
      - ml_models:/app/models
    restart: unless-stopped

  # Frontend Dashboard
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_COST_SERVICE_URL: ${NEXT_PUBLIC_COST_SERVICE_URL:-http://localhost:8001}
        NEXT_PUBLIC_ML_SERVICE_URL: ${NEXT_PUBLIC_ML_SERVICE_URL:-http://localhost:8002}
        NEXT_PUBLIC_DEFAULT_ACCOUNT_PROVIDER: ${NEXT_PUBLIC_DEFAULT_ACCOUNT_PROVIDER:-demo}
        NEXT_PUBLIC_DEFAULT_DEMO_SCENARIO: ${NEXT_PUBLIC_DEFAULT_DEMO_SCENARIO:-saas}
    container_name: cloudpulse-frontend
    environment:
      NEXT_PUBLIC_COST_SERVICE_URL: ${NEXT_PUBLIC_COST_SERVICE_URL:-http://localhost:8001}
      NEXT_PUBLIC_ML_SERVICE_URL: ${NEXT_PUBLIC_ML_SERVICE_URL:-http://localhost:8002}
      NEXT_PUBLIC_DEFAULT_ACCOUNT_PROVIDER: ${NEXT_PUBLIC_DEFAULT_ACCOUNT_PROVIDER:-demo}
      NEXT_PUBLIC_DEFAULT_DEMO_SCENARIO: ${NEXT_PUBLIC_DEFAULT_DEMO_SCENARIO:-saas}
    ports:
      - "3005:3000"
    depends_on:
      - cost-service
      - ml-service
    restart: unless-stopped

  # Prometheus
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: cloudpulse-prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    restart: unless-stopped

  # Tempo trace backend
  tempo:
    image: grafana/tempo:2.5.0
    container_name: cloudpulse-tempo
    command: ["-config.file=/etc/tempo/tempo.yml"]
    volumes:
      - ./monitoring/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"
    restart: unless-stopped

  # OpenTelemetry Collector
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.102.1
    container_name: cloudpulse-otel-collector
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./monitoring/otel/collector.yml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      - tempo
    ports:
      - "4317:4317"
      - "4318:4318"
    restart: unless-stopped

  # Grafana
  grafana:
    image: grafana/grafana:10.2.0
    container_name: cloudpulse-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: cloudpulse
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
      - tempo
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  ml_models:
  prometheus_data:
  grafana_data:
  tempo_data:
